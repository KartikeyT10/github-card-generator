<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Dev Card Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #238636;
            --accent-hover: #2ea043;
            --error: #f85149;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #58a6ff, #bc8cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subheading {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 2rem;
            background: var(--card-bg);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group:focus-within {
            border-color: #58a6ff;
            box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.2);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 16px;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        button.generate-btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
            font-family: inherit;
        }

        button.generate-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        button.generate-btn:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Skeleton Loading */
        #loader {
            display: none;
            margin-top: 2rem;
            text-align: left;
        }

        .skeleton {
            background: #161b22;
            background: linear-gradient(110deg, #161b22 8%, #21262d 18%, #161b22 33%);
            border-radius: 12px;
            background-size: 200% 100%;
            animation: 1.5s shine linear infinite;
            border: 1px solid var(--border-color);
        }

        .skeleton-card {
            height: 380px;
            width: 100%;
        }

        @keyframes shine {
            to {
                background-position-x: -200%;
            }
        }

        /* Result Area */
        #result-container {
            display: none;
            margin-top: 2rem;
            animation: fadeIn 0.6s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #card-frame {
            width: 100%;
            height: 480px;
            border: none;
            border-radius: 12px;
            background: transparent;
        }

        .actions {
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .btn-secondary {
            background: var(--card-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        .btn-secondary:hover {
            background: #21262d;
            border-color: #8b949e;
        }

        /* Error Message */
        #error-msg {
            display: none;
            color: var(--error);
            background: rgba(248, 81, 73, 0.1);
            padding: 12px;
            border-radius: 8px;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            border: 1px solid rgba(248, 81, 73, 0.2);
        }

        .fade-in { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div class="container">
        <h1>GitHub Dev Card Generator</h1>
        <p class="subheading">Enter any public GitHub username</p>

        <div class="input-group">
            <input type="text" id="username" placeholder="e.g. torvalds" spellcheck="false" autocomplete="off">
            <button id="generate-btn" class="generate-btn" onclick="generate()">Generate Card</button>
        </div>

        <div id="error-msg"></div>

        <div id="loader">
            <div class="skeleton skeleton-card"></div>
            <p style="text-align: center; margin-top: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
                Gemini is analyzing the developer vibe...
            </p>
        </div>

        <div id="result-container">
            <iframe id="card-frame" title="Dev Card"></iframe>
            <div class="actions">
                <button class="btn-secondary" onclick="copyUrl()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 0 1 0 1.5h-1.5a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-1.5a.75.75 0 0 1 1.5 0v1.5A1.75 1.75 0 0 1 9.25 16h-7.5A1.75 1.75 0 0 1 0 14.25Z"></path><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0 1 14.25 11h-7.5A1.75 1.75 0 0 1 5 9.25Zm1.75-.25a.25.25 0 0 0-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25v-7.5a.25.25 0 0 0-.25-.25Z"></path></svg>
                    Copy Link
                </button>
                <button class="btn-secondary" onclick="downloadHtml()">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M2.75 14A1.75 1.75 0 0 1 1 12.25v-2.5a.75.75 0 0 1 1.5 0v2.5c0 .138.112.25.25.25h10.5a.25.25 0 0 0 .25-.25v-2.5a.75.75 0 0 1 1.5 0v2.5A1.75 1.75 0 0 1 13.25 14Z"></path><path d="M7.25 7.689V2a.75.75 0 0 1 1.5 0v5.689l1.97-1.969a.749.749 0 1 1 1.06 1.06l-3.25 3.25a.749.749 0 0 1-1.06 0L4.22 6.78a.749.749 0 1 1 1.06-1.06l1.97 1.969Z"></path></svg>
                    Download
                </button>
            </div>
        </div>
    </div>

    <script>
        const configuredBackendUrl = '${BACKEND_URL}';
        const BACKEND_URL = configuredBackendUrl.startsWith('http')
            ? configuredBackendUrl
            : (location.protocol.startsWith('http') ? location.origin : 'http://127.0.0.1:8080');
        let lastUrl = '';
        let lastHtml = '';

        async function generate() {
            const usernameInput = document.getElementById('username');
            const username = usernameInput.value.trim();
            if (!username) return;

            const btn = document.getElementById('generate-btn');
            const loader = document.getElementById('loader');
            const result = document.getElementById('result-container');
            const error = document.getElementById('error-msg');
            const frame = document.getElementById('card-frame');

            // Reset UI
            btn.disabled = true;
            error.style.display = 'none';
            result.style.display = 'none';
            loader.style.display = 'block';

            try {
                const response = await fetch(`${BACKEND_URL}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username })
                });

                const data = await response.json();

                if (!response.ok) throw new Error(data.detail || 'Failed to generate card');

                lastUrl = data.card_url.trim();
                lastHtml = data.html;

                // Load the card
                const fullUrl = lastUrl.startsWith('http') ? lastUrl : `${BACKEND_URL}${lastUrl}`;
                frame.src = fullUrl;
                
                // Show result after a small delay for smoother transition
                setTimeout(() => {
                    loader.style.display = 'none';
                    result.style.display = 'block';
                    btn.disabled = false;
                }, 500);

            } catch (err) {
                console.error(err);
                loader.style.display = 'none';
                const isNetworkError = err instanceof TypeError && err.message === 'Failed to fetch';
                error.innerText = isNetworkError
                    ? `Error: Backend is not running. Start it, then open ${BACKEND_URL}`
                    : `Error: ${err.message}`;
                error.style.display = 'block';
                btn.disabled = false;
            }
        }

        function copyUrl() {
            const fullUrl = lastUrl.startsWith('http') ? lastUrl : `${BACKEND_URL}${lastUrl}`;
            navigator.clipboard.writeText(fullUrl).then(() => {
                const btn = event.currentTarget;
                const originalText = btn.innerHTML;
                btn.innerHTML = 'Copied!';
                setTimeout(() => btn.innerHTML = originalText, 2000);
            });
        }

        function downloadHtml() {
            const blob = new Blob([lastHtml], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `${document.getElementById('username').value || 'github-card'}.html`;
            a.click();
        }

        // Enter key support
        document.getElementById('username').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') generate();
        });
    </script>
</body>
</html>
